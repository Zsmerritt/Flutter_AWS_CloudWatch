name: aws_cloudwatch
description: An easy, lightweight, turnkey solution for logging with AWS CloudWatch
version: 2.0.0+1
homepage: https://github.com/Zsmerritt/Flutter_AWS_CloudWatch

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  aws_request: ^2.0.0 # Make request to AWS
  synchronized: ^3.0.0 # Synchronize requests to ensure valid keys
  http: ^1.0.0 # Http package for parsing AWS responses correctly on Multiple Platforms
  crypto: ^3.0.0 # Message hashes used to collate split messages

dev_dependencies:
  # Dart 3.8+ SDKs only ship frontend_server_aot.dart.snapshot; client 4.x
  # selects it. test_core still allows 3.x, so we pin the transitive explicitly.
  frontend_server_client: ^4.0.0
  # Resolve to latest compatible (6.x on Dart 3.8+, 5.x on 3.6–3.7) for package:lints/core.yaml.
  lints: '>=5.1.1 <7.0.0'
  test: ^1.25.5